<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table Booking</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: url('assets/food background.jpg') no-repeat center center/cover;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 16px;
      font-family: Arial, sans-serif;
      width: 100%;
      overflow-x: hidden;
    }

    .booking-container {
      width: 900px;
      max-width: 100%;
      margin-top: 24px;
      box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.49);
      border-radius: 15px;
      padding: 24px;
      text-align: center;
      background: #ffa76c7c;
      border: 4px solid #ff6600;
      position: relative;
    }

    /* brand corner label */
    .brand-corner {
      position: absolute;
      left: 20px;
      top: 15px;
      color: #ff6600;
      padding: 6px 10px;
      font-weight: 700;
      text-align: justify;
      font-family: "Brush Script MT", "Lucida Handwriting", "Apple Chancery", "Comic Sans MS", cursive;
      font-size: 1rem;
    }

    h1 {
      margin-bottom: 20px;
      margin-top: 10px;
      color: #ff6600;
      font-family: "Brush Script MT", "Lucida Handwriting", "Apple Chancery", "Comic Sans MS", cursive;
      font-size: 2.2rem;
      font-weight: 700;
      font-style: normal;
      letter-spacing: 0.6px;
      text-shadow: 0 1px 0 rgba(255, 102, 0, 0.08);
    }

    #welcomeMsg {
      font-size: 1rem;
      color: #333;
      margin-bottom: 15px;
    }

    .booking-inner {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .booking-image-wrap {
      flex: 0 0 370px;
      width: 370px;
    }

    .booking-image {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      background: #ffa76c7c;
      border-radius: 12px;
      flex: 1 1 auto;
      padding: 8px 0;
      min-width: 250px;
    }

    label {
      font-size: 15px;
      margin-top: 12px;
      align-self: flex-start;
      width: 100%;
      padding: 0 20px;
      color: #333;
      font-weight: 600;
    }

    select,
    input {
      align-items: center;
      width: calc(100% - 50px);
      max-width: 500px;
      padding: 11px;
      border-radius: 8px;
      border: 2px solid #ff6600;
      outline: none;
      margin: 8px auto;
      font-size: 15px;
      transition: border-color 0.3s ease;
    }

    select:focus,
    input:focus {
      border-color: #e65c00;
      box-shadow: 0 0 5px rgba(255, 102, 0, 0.3);
    }

    button {
      width: calc(100% - 40px);
      max-width: 520px;
      padding: 12px;
      background: #ff6600;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      margin: 12px 20px 8px 20px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #e65c00;
    }

    button:active {
      transform: scale(0.98);
    }

    .bookings-list {
      margin-top: 25px;
      text-align: left;
    }

    .bookings-list h3 {
      color: #333;
      font-size: 1.2rem;
      margin-bottom: 15px;
    }

    .bookings-list p {
      color: #666;
      font-style: italic;
    }

    .booking-item {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 5px solid #ff6600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .booking-details {
      flex: 1;
      padding-right: 10px;
      text-align: left;
      font-size: 14px;
    }

    .booking-details strong {
      color: #ff6600;
    }

    .booking-details small {
      display: block;
      color: #999;
      margin-top: 5px;
    }

    .cancel-btn {
      background: #ff6600;
      border: none;
      color: #fff;
      width: auto;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-align: center;
      margin-left: 8px;
      min-width: 72px;
      white-space: nowrap;
      transition: background 0.3s ease;
    }

    .cancel-btn:hover {
      background: #e65c00;
    }

    /* Responsive Design */
    @media (max-width: 1200px) {
      .booking-container {
        padding: 20px;
      }

      h1 {
        font-size: 1.9rem;
      }

      .booking-image-wrap {
        flex: 0 0 320px;
        width: 320px;
      }

      form {
        padding: 8px 0;
      }

      select,
      input {
        width: calc(100% - 40px);
        max-width: 450px;
      }

      button {
        max-width: 480px;
      }
    }

    @media (max-width: 900px) {
      body {
        padding: 20px 12px;
      }

      .booking-container {
        padding: 18px;
        border-radius: 12px;
      }

      .brand-corner {
        left: 14px;
        top: 12px;
        font-size: 0.9rem;
        padding: 5px 8px;
      }

      h1 {
        font-size: 1.6rem;
        margin-bottom: 15px;
      }

      .booking-inner {
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }

      .booking-image-wrap {
        flex: 0 0 auto;
        width: 280px;
        max-width: 100%;
      }

      form {
        width: 100%;
        max-width: 450px;
        min-width: auto;
      }

      select,
      input {
        width: calc(100% - 40px);
        max-width: 100%;
      }

      button {
        width: calc(100% - 40px);
        max-width: 100%;
      }

      .booking-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .cancel-btn {
        margin-left: 0;
        width: auto;
        align-self: flex-end;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 16px 10px;
      }

      .booking-container {
        padding: 16px;
        border-radius: 10px;
        margin-top: 16px;
      }

      .brand-corner {
        left: 12px;
        top: 10px;
        font-size: 0.8rem;
        padding: 4px 6px;
      }

      h1 {
        font-size: 1.4rem;
        margin-bottom: 12px;
      }

      #welcomeMsg {
        font-size: 0.95rem;
      }

      .booking-inner {
        gap: 12px;
        margin-top: 15px;
      }

      .booking-image-wrap {
        width: 220px;
        min-width: 200px;
      }

      form {
        padding: 6px 0;
      }

      label {
        font-size: 14px;
        margin-top: 10px;
        padding: 0 16px;
      }

      select,
      input {
        width: calc(100% - 32px);
        padding: 10px;
        font-size: 14px;
        margin: 6px auto;
      }

      button {
        padding: 11px;
        font-size: 15px;
        margin: 10px 16px 6px 16px;
        width: calc(100% - 32px);
      }

      .bookings-list {
        margin-top: 20px;
      }

      .bookings-list h3 {
        font-size: 1.1rem;
        margin-bottom: 12px;
      }

      .booking-item {
        padding: 10px;
        margin-bottom: 8px;
        gap: 8px;
      }

      .booking-details {
        padding-right: 0;
        font-size: 13px;
      }

      .booking-details small {
        margin-top: 4px;
      }

      .cancel-btn {
        padding: 5px 12px;
        font-size: 12px;
        min-width: 65px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px 8px;
      }

      .booking-container {
        padding: 12px;
        border-radius: 8px;
        margin-top: 10px;
        border-width: 3px;
      }

      .brand-corner {
        left: 8px;
        top: 8px;
        font-size: 0.7rem;
        padding: 3px 5px;
      }

      h1 {
        font-size: 1.2rem;
        margin-bottom: 10px;
        letter-spacing: 0.3px;
      }

      #welcomeMsg {
        font-size: 0.9rem;
        margin-bottom: 10px;
      }

      .booking-inner {
        gap: 10px;
        margin-top: 12px;
      }

      .booking-image-wrap {
        width: 160px;
        min-width: 140px;
      }

      .booking-image {
        border-radius: 8px;
      }

      form {
        padding: 4px 0;
      }

      label {
        font-size: 13px;
        margin-top: 8px;
        padding: 0 12px;
      }

      select,
      input {
        width: calc(100% - 24px);
        padding: 9px;
        font-size: 13px;
        margin: 5px auto;
        border-radius: 6px;
      }

      button {
        padding: 10px;
        font-size: 14px;
        margin: 8px 12px 6px 12px;
        width: calc(100% - 24px);
      }

      button:active {
        transform: scale(0.95);
      }

      .bookings-list {
        margin-top: 15px;
      }

      .bookings-list h3 {
        font-size: 0.95rem;
        margin-bottom: 10px;
      }

      .booking-item {
        padding: 8px;
        margin-bottom: 6px;
        border-left-width: 4px;
        flex-direction: column;
        align-items: stretch;
      }

      .booking-details {
        font-size: 12px;
        padding-right: 0;
        margin-bottom: 6px;
      }

      .booking-details strong {
        display: inline;
      }

      .booking-details small {
        margin-top: 3px;
        font-size: 11px;
      }

      .cancel-btn {
        width: 100%;
        padding: 8px 10px;
        font-size: 11px;
        margin-left: 0;
        align-self: stretch;
      }
    }

    @media (max-width: 360px) {
      .booking-container {
        padding: 10px;
      }

      h1 {
        font-size: 1rem;
        margin-bottom: 8px;
      }

      .booking-image-wrap {
        width: 120px;
      }

      label {
        font-size: 12px;
      }

      select,
      input,
      button {
        font-size: 12px;
        padding: 8px;
      }

      .booking-details {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="booking-container">
    <div class="brand-corner">SeffronSky</div>
    <h1>Table Booking</h1>
    <p id="welcomeMsg"></p>

    <div class="booking-inner">
      <div class="booking-image-wrap">
        <img src="assets/table.png" alt="Table" class="booking-image">
      </div>

      <form id="bookingForm">
        <label for="tableNumber">Select Table Number:</label>
        <select id="tableNumber" required>
          <!-- options populated by JS to avoid showing already-booked tables -->
        </select>

        <label for="numPeople">How Many People:</label>
        <input type="number" id="numPeople" placeholder="Enter number of people" min="1" required />

        <button type="submit">Book Table</button>
      </form>
    </div>

    <div class="bookings-list" id="bookingsList"></div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("loggedUser"));
const welcomeMsg = document.getElementById("welcomeMsg");
const bookingsList = document.getElementById("bookingsList");

if (!user) {
    alert("Please login first!");
    window.location.href = "login.html";
} else {
    welcomeMsg.textContent = `Welcome, ${user.name}!`;
}

// 1. Load User's Specific Bookings from MySQL
function loadBookings() {
    fetch(`/api/user-bookings?email=${user.email}`)
        .then(res => res.json())
        .then(data => {
            bookingsList.innerHTML = "<h3>Your Bookings:</h3>";
            if (!data || data.length === 0) {
                bookingsList.innerHTML += "<p>No bookings yet.</p>";
            } else {
                data.forEach((b) => {
                    const div = document.createElement("div");
                    div.classList.add("booking-item");
                    div.innerHTML = `
                        <div class="booking-details">
                            <strong>Table:</strong> ${b.tableNumber} |
                            <strong>People:</strong> ${b.numPeople}<br>
                            <small><em>Booked on ${b.booking_date}</em></small>
                        </div>
                        <button class="cancel-btn" onclick="cancelBooking(${b.id})">Cancel</button>
                    `;
                    bookingsList.appendChild(div);
                });
            }
        })
        .catch(err => console.error("Error loading bookings:", err));
}

// 2. Build Table Options by Checking All Database Bookings
function populateTableOptions() {
    const select = document.getElementById('tableNumber');
    if (!select) return;

    fetch('/api/data') 
        .then(res => res.json())
        .then(data => {
            // Get all currently booked tables from the MySQL 'bookings' table
            const booked = new Set((data.bookings || []).map(b => String(b.tableNumber)));
            const totalTables = 10;
            
            select.innerHTML = '<option value="">-- Choose Table --</option>';
            for (let i = 1; i <= totalTables; i++) {
                const val = String(i);
                const opt = document.createElement('option');
                opt.value = val;
                if (booked.has(val)) {
                    opt.disabled = true;
                    opt.textContent = `Table ${i} (Booked)`;
                } else {
                    opt.textContent = `Table ${i}`;
                }
                select.appendChild(opt);
            }
        });
}

// 3. Handle New Booking (Saves to MySQL)
document.getElementById("bookingForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const tableNumber = document.getElementById("tableNumber").value;
    const numPeople = document.getElementById("numPeople").value;

    const newBooking = {
        email: user.email,
        tableNumber,
        numPeople,
        date: new Date().toLocaleString()
    };

    fetch("/api/bookings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(newBooking)
    })
    .then(res => res.json())
    .then((data) => {
        if (data.success) {
            // save the booking id locally so we can delete it later if needed
            if (data.id) {
                localStorage.setItem('lastBookingId', data.id);
            }

            alert('Table booked successfully!');
            populateTableOptions();
            loadBookings();
            document.getElementById("bookingForm").reset();
        // redirect to menu after 3 seconds so user can continue ordering
        setTimeout(() => { window.location.href = 'Menu.html'; }, 3000);
        } else {
            alert(data.message || "This table is already booked in the database.");
            populateTableOptions();
        }
    });
});

// 4. Cancel Booking (Deletes from MySQL)
function cancelBooking(bookingId) {
    if (confirm("Cancel this booking?")) {
        fetch(`/api/cancel-booking/${bookingId}`, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // clear stored id if it matches the one we cancelled
                    if (localStorage.getItem('lastBookingId') == bookingId) {
                        localStorage.removeItem('lastBookingId');
                    }
                    alert("Booking cancelled!");
                    populateTableOptions();
                    loadBookings();
                }
            });
    }
}

// Initial Load
populateTableOptions();
loadBookings();
    
  </script>
</body>
</html>
