<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PointSell - Restaurant POS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="brand">
                    <h1>Saffron<span>Sky</span></h1>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search Anything Here" id="searchInput">
                    <button class="search-btn" id="searchBtn" aria-label="Search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Menu Section -->
            <section class="menu-section">
                <h2 class="section-title">Special Menu For You</h2>
                <div class="menu-grid" id="menuGrid"></div>
            </section>
        </main>

        <!-- Order Summary Sidebar -->
        <aside class="order-sidebar">
            <div class="order-header">
                <button class="notification-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </button>
                <div class="order-number">
                    <span id="tableNumberDisplay">Table: -</span>
                    <button class="close-btn">&times;</button>
                </div>
            </div>

            <div class="order-items" id="orderItems">
                <div class="empty-order">
                    <p>No items in order</p>
                </div>
            </div>

            <div class="order-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Charges</span>
                    <span id="charges">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">₹0.00</span>
                </div>
            </div>

            <button class="place-order-btn" id="placeOrderBtn">Place Order</button>
        </aside>
    </div>

    <button id="logoutBtn">Logout</button>
    <script src="script.js"></script>
    <script>
  (function(){
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    if (isLoggedIn !== "true") {
      alert("Please login first.");
      window.location.href = "index.html";
      return;
    }
    const user = JSON.parse(localStorage.getItem("loggedUser") || "{}");
    const welcomeEl = document.getElementById("welcome"); // add <div id="welcome"></div> where you want name
    if (welcomeEl && user.name) welcomeEl.textContent = "Welcome, " + user.name;
        // Display table number from bookings (find latest booking for this user)
        const tableDisplay = document.getElementById('tableNumberDisplay');
        try {
            const allBookings = JSON.parse(localStorage.getItem('bookings') || '[]');
            const userBookings = allBookings.filter(b => b.email === (user.email || ''));
            if (userBookings.length > 0) {
                const latest = userBookings[userBookings.length - 1];
                if (tableDisplay) tableDisplay.textContent = 'Table: ' + latest.tableNumber;
            } else {
                if (tableDisplay) tableDisplay.textContent = 'Table: -';
            }
        } catch (e) {
            if (tableDisplay) tableDisplay.textContent = 'Table: -';
        }
  })();

  document.getElementById("logoutBtn")?.addEventListener("click", () => {
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("loggedUser");
    window.location.href = "index.html";
  });
    </script>
</body>
</html>

<!-- styles.css -->
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background: #f5f5f5;
    color: #2d3748;
}

.app-container {
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* Sidebar removed - main content will take full width */


.logo svg {
    width: 40px;
    height: 40px;
    color: #ff6b35;
}

.nav-menu {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    flex: 1;
}

.nav-item {
    width: 48px;
    height: 48px;
    background: transparent;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    color: #00000070;
}

.nav-item svg {
    width: 24px;
    height: 24px;
}

.nav-item:hover {
    background: #374151;
    color: #ff6b35;
}

.nav-item.active {
    background: #ff6b35;
    color: white;
}

.settings {
    margin-top: auto;
}

/* Main Content */
.main-content {
    flex: 1 1 auto;
    width: 100%;
    background: white;
    overflow-y: auto;
    padding: 2rem;
}

.header {
    display: flex;
    align-items: center;
    gap: 2rem;
    margin-bottom: 2rem;
}

.brand h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: #2d3748;
    font-family: "Brush Script MT", "Lucida Handwriting", "Apple Chancery", "Comic Sans MS", cursive;
}

.brand span {
    color: #ff6b35;
}

.search-bar {
    flex: 1;
    max-width: 500px;
    position: relative;
}

.search-bar input {
    width: 100%;
    padding: 0.75rem 3rem 0.75rem 1rem;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.875rem;
    outline: none;
}

.search-bar input:focus {
    border-color: #ff6b35;
}

.search-btn {
    position: absolute;
    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    color: #a0aec0;
}

.search-btn svg {
    width: 20px;
    height: 20px;
}

/* Menu Section */
.section-title {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    color: #2d3748;
}

.menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.5rem;
}

.menu-card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
}

.menu-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.1);
}

.menu-card-image {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background:#ffffff ;
}

.menu-card-content {
    padding: 1rem;
}

.menu-card-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 0.5rem;
}

.menu-card-title {
    font-size: 1rem;
    font-weight: 600;
    color: #2d3748;
}

.menu-card-price {
    font-size: 1rem;
    font-weight: 700;
    color: #ff6b35;
}

.menu-card-description {
    font-size: 0.75rem;
    color: #a4a4a4;
    margin-bottom: 0.75rem;
    line-height: 1.4;
}

.menu-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.rating {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 0.875rem;
    font-weight: 600;
    color: #2d3748;
}

.rating svg {
    width: 16px;
    height: 16px;
    color: #ff6b35;
    fill: #ff6b35;
}

.add-product-btn {
    background: #ff6b35;
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}

.add-product-btn:hover {
    background: #e55a2b;
}

/* Order Sidebar */
.order-sidebar {
    width: 360px;
    background: #ffffff;
    border-left: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
}

.order-header {
    padding: 1.5rem;
    border-bottom: 1px solid #e2e8f0;
}

.notification-btn {
    background: #ff6b35;
    border: none;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 1rem;
    color: white;
}

.notification-btn svg {
    width: 24px;
    height: 24px;
}

.order-number {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.875rem;
    font-weight: 600;
}

.close-btn {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #a4a4a4;
    line-height: 1;
}

.order-items {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
}

.empty-order {
    text-align: center;
    color: #a4a4a4;
    padding: 2rem;
}

.order-item {
    display: flex;
    gap: 0.75rem;
    padding: 0.75rem;
    border-radius: 8px;
    margin-bottom: 0.75rem;
    background: #f7fafc;
}

.order-item-image {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    object-fit: cover;
}

.order-item-details {
    flex: 1;
}

.order-item-name {
    font-size: 0.875rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
}

.order-item-price {
    font-size: 0.875rem;
    color: #ff6b35;
    font-weight: 600;
}

.order-item-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
}

.quantity-btn {
    width: 24px;
    height: 24px;
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
}

.quantity-display {
    font-size: 0.875rem;
    font-weight: 600;
    min-width: 20px;
    text-align: center;
}

.remove-item-btn {
    background: #fee;
    color: #f56565;
    border: none;
    width: 24px;
    height: 24px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: auto;
    font-size: 1.2rem;
    line-height: 1;
}

.order-summary {
    padding: 1.5rem;
    border-top: 1px solid #e2e8f0;
}

.summary-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.75rem;
    font-size: 0.875rem;
    color: #a4a4a4;
}

.summary-row.total {
    font-size: 1.125rem;
    font-weight: 700;
    color: #2d3748;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 2px solid #e2e8f0;
}

.place-order-btn {
    background: #ff6b35;
    color: white;
    border: none;
    padding: 1rem;
    margin: 1.5rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}

.place-order-btn:hover {
    background: #e55a2b;
}

.place-order-btn:disabled {
    background: #ffffff;
    cursor: not-allowed;
}

@media (max-width: 1200px) {
    .order-sidebar {
        width: 280px;
    }
}

@media (max-width: 768px) {
    .sidebar {
        width: 60px;
    }
    
    .order-sidebar {
        position: fixed;
        right: -320px;
        top: 0;
        height: 100vh;
        z-index: 1000;
        transition: right 0.3s;
    }
    
    .order-sidebar.active {
        right: 0;
    }
}
</style>

<!-- script.js -->
<script>
// Menu Data
const menuData = [
    {
        id: 1,
        name: 'Grill Sandwich',
        price: 80.00,
        image: 'assets/Grill.jpg',
        description: ' Golden, crispy bread stuffed with cheesy, flavorful fillings and grilled to perfection.',
        rating: 4.7
    },
    {
        id: 2,
        name: 'Dosa',
        price: 90.00,
        image: 'assets/Dosa.jpg',
        description: 'A crispy, golden South Indian delight served hot with chutney and sambar.',
        rating: 4.8
    },
    {
        id: 3,
        name: 'Noodles',
        price: 70.00,
        image: 'assets/Noodels.jpg',
        description: ' Stir-fried perfection with fresh veggies and flavorful spices.',
        rating:4.6
    },
    {
        id: 4,
        name: 'Frankie',
        price: 60.00,
        image: 'assets/frankie.jpg',
        description: ' A soft roll stuffed with spicy fillings, the ultimate street-style wrap.',
        rating: 4.4
    },
    {
        id: 5,
        name: 'Manchurian Noodles',
        price: 100.00,
        image: 'assets/Manchurian.jpg',
        description: 'Fiery Indo-Chinese fusion of noodles tossed with tangy Manchurian balls.',
        rating: 4.7
    },
    {
        id: 6,
        name: 'Pani Puri',
        price: 25.00,
        image: 'assets/Panipuri.jpg',
        description: 'Crunchy puris filled with tangy, spicy, and sweet flavored water – a burst of taste in every bite!',
        rating: 5.0
    },
    {
        id: 7,
        name: 'Pizza',
        price: 170.00,
        image: 'assets/Pizza.jpg',
        description: ' Cheesy, oven-baked goodness topped with fresh veggies and sauces.',
        rating: 4.3
    },

    {
        id: 8,
        name: 'Pasta',
        price: 130.00,
        image: 'assets/Pasta.jpg',
        description: 'Creamy, saucy, and perfectly cooked – a comfort food loved worldwide.',
        rating: 4.3
    },
   
];

// State
let orderItems = [];

// DOM Elements
const menuGrid = document.getElementById('menuGrid');
const orderItemsContainer = document.getElementById('orderItems');
const placeOrderBtn = document.getElementById('placeOrderBtn');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');

// Initialize
function init() {
    // if returning from billing to add more, preload existing currentOrder items
    try {
        const existing = JSON.parse(localStorage.getItem('currentOrder') || 'null');
        if (existing && Array.isArray(existing.items)) {
            // map items to internal orderItems shape (image already included)
            orderItems = existing.items.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.qty, image: i.image }));
        }
    } catch(e) { /* ignore parse errors */ }

    renderMenu();
    renderOrderItems();
    updateOrderSummary();
}

// Render Menu (accepts optional data to render filtered results)
function renderMenu(data = menuData) {
    if (!data || data.length === 0) {
        menuGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#a4a4a4;">No items available</p>';
        return;
    }

    menuGrid.innerHTML = data.map(item => `
        <div class="menu-card">
            <img src="${item.image}" alt="${item.name}" class="menu-card-image">
            <div class="menu-card-content">
                <div class="menu-card-header">
                    <h3 class="menu-card-title">${item.name}</h3>
                    <span class="menu-card-price">₹${item.price.toFixed(2)}</span>
                </div>
                <p class="menu-card-description">${item.description}</p>
                <div class="menu-card-footer">
                    <div class="rating">
                        <svg viewBox="0 0 20 20">
                            <path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/>
                        </svg>
                        ${item.rating.toFixed(1)}
                    </div>
                    <button class="add-product-btn" onclick="addToOrder(${item.id})">+ Add Product</button>
                </div>
            </div>
        </div>
    `).join('');
}

// Search handler — filters by name or description (case-insensitive)
function handleSearch() {
    const q = (searchInput.value || '').trim().toLowerCase();
    if (!q) {
        renderMenu(); // show all when query is empty
        return;
    }
    const filtered = menuData.filter(item =>
        item.name.toLowerCase().includes(q) ||
        item.description.toLowerCase().includes(q)
    );
    if (filtered.length === 0) {
        menuGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#a4a4a4;">No results found for "' + q + '"</p>';
    } else {
        renderMenu(filtered);
    }
}

// Wire search events
searchBtn.addEventListener('click', handleSearch);
searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSearch();
});

// Add to Order
function addToOrder(itemId) {
    const item = menuData.find(i => i.id === itemId);
    const existingItem = orderItems.find(i => i.id === itemId);
    
    if (existingItem) {
        existingItem.quantity++;
    } else {
        orderItems.push({ ...item, quantity: 1 });
    }
    
    renderOrderItems();
    updateOrderSummary();
}

// Render Order Items
function renderOrderItems() {
    if (orderItems.length === 0) {
        orderItemsContainer.innerHTML = '<div class="empty-order"><p>No items in order</p></div>';
        placeOrderBtn.disabled = true;
        return;
    }
    
    placeOrderBtn.disabled = false;
    
    orderItemsContainer.innerHTML = orderItems.map(item => `
        <div class="order-item">
            <img src="${item.image}" alt="${item.name}" class="order-item-image">
            <div class="order-item-details">
                <div class="order-item-name">${item.name}</div>
                <div class="order-item-price">₹${item.price.toFixed(2)}</div>
                <div class="order-item-controls">
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                    <span class="quantity-display">${item.quantity}</span>
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                    <button class="remove-item-btn" onclick="removeFromOrder(${item.id})">×</button>
                </div>
            </div>
        </div>
    `).join('');
}

// Update Quantity
function updateQuantity(itemId, delta) {
    const item = orderItems.find(i => i.id === itemId);
    if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) {
            removeFromOrder(itemId);
        } else {
            renderOrderItems();
            updateOrderSummary();
        }
    }
}

// Remove from Order
function removeFromOrder(itemId) {
    orderItems = orderItems.filter(i => i.id !== itemId);
    renderOrderItems();
    updateOrderSummary();
}

// Update Order Summary
function updateOrderSummary() {
    const subtotal = orderItems.reduce((sum, item) => sum + item.price * item.quantity, 0);
    const tax = subtotal * 0.08; // 8% tax
    const charges = 5.00; // Fixed charges
    const total = subtotal + tax + charges;
    
    document.getElementById('subtotal').textContent = `₹${subtotal.toFixed(2)}`;
    document.getElementById('tax').textContent = `₹${tax.toFixed(2)}`;
    document.getElementById('charges').textContent = `₹${charges.toFixed(2)}`;
    document.getElementById('total').textContent = `₹${total.toFixed(2)}`;
}

// Place Order: save current order and redirect to billing page
placeOrderBtn.addEventListener('click', () => {
    if (orderItems.length === 0) return alert('No items in order');

    const user = JSON.parse(localStorage.getItem('loggedUser') || 'null');
    // find latest table booking for this user
    let tableNumber = null;
    try {
        const allBookings = JSON.parse(localStorage.getItem('bookings') || '[]');
        const userBookings = user ? allBookings.filter(b => b.email === (user.email || '')) : [];
        if (userBookings.length > 0) tableNumber = userBookings[userBookings.length - 1].tableNumber;
    } catch (e) { tableNumber = null; }

    const subtotal = orderItems.reduce((sum, item) => sum + item.price * item.quantity, 0);
    const tax = +(subtotal * 0.08).toFixed(2);
    const charges = 5.00;
    const total = +(subtotal + tax + charges).toFixed(2);

    // If a currentOrder already exists, merge new quantities into it rather than creating separate orders
    const existingOrder = JSON.parse(localStorage.getItem('currentOrder') || 'null');
    let order = existingOrder;
    if (!order) {
        order = {
            id: 'ORD-' + Date.now(),
            user: user || null,
            tableNumber: tableNumber || null,
            items: [],
            subtotal, tax, charges, total,
            createdAt: new Date().toISOString(),
            status: 'pending'
        };
    }

    // merge orderItems into order.items
    order.items = order.items || [];
    orderItems.forEach(i => {
        const existing = order.items.find(x => x.id === i.id);
        if (existing) {
            existing.qty = (existing.qty || 0) + (i.quantity || i.qty || 0);
        } else {
            order.items.push({ id: i.id, name: i.name, price: i.price, qty: i.quantity || i.qty || 0, image: i.image });
        }
    });

    // recalc totals
    const newSubtotal = order.items.reduce((s, it) => s + (it.price * (it.qty || it.quantity || 0)), 0);
    order.subtotal = +newSubtotal.toFixed(2);
    order.tax = +((order.subtotal * 0.08).toFixed(2));
    order.charges = 5.00;
    order.total = +((order.subtotal + order.tax + order.charges).toFixed(2));
    order.createdAt = order.createdAt || new Date().toISOString();
    order.status = order.status || 'pending';

    // save as currentOrder and append/replace in orders list
    localStorage.setItem('currentOrder', JSON.stringify(order));
    const orders = JSON.parse(localStorage.getItem('orders') || '[]');
    const idx = orders.findIndex(o => o.id === order.id);
    if (idx === -1) orders.push(order); else orders[idx] = order;
    localStorage.setItem('orders', JSON.stringify(orders));

    // clear UI order but keep stored order so user can continue adding later
    orderItems = [];
    renderOrderItems();
    updateOrderSummary();

    // redirect to billing page
    setTimeout(() => { window.location.href = 'billing.html'; }, 300);
});

// Navigation
document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', function() {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
    });
});

// Initialize app
init();

// Listen for storage events so other tabs/pages can react when payment clears the currentOrder
window.addEventListener('storage', (e) => {
    if (e.key === 'currentOrder' && e.newValue === null) {
        // current order removed -> clear UI
        orderItems = [];
        renderOrderItems();
        updateOrderSummary();
    }
    if (e.key === 'order_cleared_at') {
        // order was cleared elsewhere (payment). Clear UI too.
        orderItems = [];
        renderOrderItems();
        updateOrderSummary();
    }
    if (e.key === 'booking_cleared_at') {
        // booking removed elsewhere (payment). You may want to refresh booking-related UI; for now clear table display
        const tableDisplay = document.getElementById('tableNumberDisplay');
        if (tableDisplay) tableDisplay.textContent = 'Table: -';
    }
});
</script>
