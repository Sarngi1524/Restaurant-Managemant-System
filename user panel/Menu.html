<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PointSell - Restaurant POS</title>
    <!-- inline styles are included later in this file; avoid external request to styles.css which may 404 -->
</head>
<body>
    <div class="app-container">
        

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="brand">
                    <h1>Saffron<span>Sky</span></h1>
                    <div class="category-icons">
                        <span class="cat-icon foodie" title="Foodie">🍽️</span>
                        <span class="cat-icon cold-drink" title="Cold Drink">🥤</span>
                        <span class="cat-icon others" title="Others">✳️</span>
                    </div>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search Anything Here" id="searchInput">
                    <button class="search-btn" id="searchBtn" aria-label="Search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Menu Section -->
            <section class="menu-section">
                <h2 class="section-title">Special Menu For You</h2>
                <div class="menu-grid" id="menuGrid"></div>
            </section>
        </main>

        <!-- Order Summary Sidebar -->
        <aside class="order-sidebar">
            <div class="order-header">
                <button class="notification-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </button>
                <div class="order-number">
                    <span id="tableNumberDisplay">Table: -</span>
                    <button class="close-btn">&times;</button>
                </div>
            </div>

            <div class="order-items" id="orderItems">
                <div class="empty-order">
                    <p>No items in order</p>
                </div>
            </div>

            <div class="order-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Charges</span>
                    <span id="charges">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">₹0.00</span>
                </div>
            </div>

            <button class="place-order-btn" id="placeOrderBtn">Place Order</button>
        </aside>
    </div>

    <!-- external script.js removed to avoid 404/MIME errors; the main script is embedded later in this file -->
    <script>
  (function(){
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    if (isLoggedIn !== "true") {
      alert("Please login first.");
      window.location.href = "index.html";
      return;
    }
    const _rawUser = localStorage.getItem('loggedUser');
    const user = (_rawUser && _rawUser !== 'undefined') ? JSON.parse(_rawUser) : {};
    const welcomeEl = document.getElementById("welcome"); // add <div id="welcome"></div> where you want name
    if (welcomeEl && user.name) welcomeEl.textContent = "Welcome, " + user.name;
        // Display table number from bookings (find latest booking for this user)
        const tableDisplay = document.getElementById('tableNumberDisplay');
        try {
            const rawBookings = localStorage.getItem('bookings');
            const allBookings = (rawBookings && rawBookings !== 'undefined') ? JSON.parse(rawBookings) : [];
            const userBookings = allBookings.filter(b => b.email === (user.email || ''));
            if (userBookings.length > 0) {
                const latest = userBookings[userBookings.length - 1];
                if (tableDisplay) tableDisplay.textContent = 'Table: ' + latest.tableNumber;
            } else {
                if (tableDisplay) tableDisplay.textContent = 'Table: -';
            }
        } catch (e) {
            if (tableDisplay) tableDisplay.textContent = 'Table: -';
        }
  })();
    </script>
</body>
</html>

<style>

}

.settings {

.main-content {

}

.header {

    gap: 2rem;

}

.brand h1 {

.brand span {

}

.search-bar {

}

.search-bar input {

.search-bar input:focus {

}

.search-btn {

    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);

    border: none;
    cursor: pointer;
    padding: 0.5rem;
    color: #a0aec0;
    transition: color 0.3s ease;
}

.search-btn:hover {

}

.search-btn svg {

    height: 20px;
}

/* Menu Section */
.section-title {

    margin-bottom: 1.5rem;
    color: #2d3748;
}

.menu-grid {

    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));

}

.menu-card {

    border: 1px solid #e2e8f0;
    border-radius: 12px;

}

.menu-card:hover {

}

.menu-card-image {

.menu-card-content {

.menu-card-header {

.menu-card-title {

    color: #2d3748;

.menu-card-price {

}

.menu-card-description {

.menu-card-footer {

    align-items: center;

    flex-wrap: wrap;
}

.rating svg {

    height: 14px;
    fill: #ff6600;
}

.menu-star {

    color: #ccc;

    cursor: pointer;
    transition: color 0.2s ease;
}

.menu-star:hover, .menu-star.selected {

}

.category-icons {

    gap: 8px;
    justify-content: center;
}

.cat-icon {

}

.cat-icon:hover {

}

.cat-icon.cold-drink {

}

.cat-icon.others {

}

.add-product-btn {

<script>
// Small helper to safely parse JSON values from localStorage
// Small helper to safely parse JSON values from localStorage
function _safeGet(key, fallback = null) {
    const raw = localStorage.getItem(key);
    if (raw === null || raw === undefined || raw === 'undefined') return fallback;
    try { return JSON.parse(raw); } catch (e) { return fallback; }
}

// 1. Changed: Start with an empty array. Data will now come from MySQL.
let menuData = []; 
let orderItems = [];
let currentTableNumber = null;

// DOM Elements
const menuGrid = document.getElementById('menuGrid');
const orderItemsContainer = document.getElementById('orderItems');
const placeOrderBtn = document.getElementById('placeOrderBtn');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
// Track selected category (no dropdown anymore, icons control this)
let selectedCategory = '';

// Initialize
async function init() {
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    if (isLoggedIn !== "true") {
        alert("Please login first.");
        window.location.href = "login.html";
        return;
    }

    const user = _safeGet('loggedUser', {});
    
    // 2. NEW: Fetch live products from MySQL database
    try {
        const productRes = await fetch("/api/products");
        if (productRes.ok) {
            const serverProducts = await productRes.json();
            // merge server products with any offline products saved while server was down
            const offline = _safeGet('offlineProducts', []);
            // prefer server entries (by id) and append offline entries that don't exist on server
            const serverById = new Map((serverProducts || []).map(p => [String(p.id), p]));
            const merged = Array.from(serverProducts || []);
            (offline || []).forEach(op => {
                const key = String(op.id || op._id || '');
                if (!key || !serverById.has(key)) merged.push(op);
            });
            menuData = merged;
        } else {
            console.warn('Products endpoint returned', productRes.status);
            menuData = _safeGet('offlineProducts', []);
        }
        renderMenu(); // Draw the menu after data (server or offline) is ready
    } catch (err) {
        console.error("Failed to load products:", err);
        // fallback to offline products saved in localStorage
        menuData = _safeGet('offlineProducts', []);
        renderMenu();
    }

    // Fetch latest booking for table number
    const tableDisplay = document.getElementById('tableNumberDisplay');
    fetch(`/api/user-bookings?email=${user.email}`)
        .then(res => res.json())
        .then(userBookings => {
            if (userBookings && userBookings.length > 0) {
                const latest = userBookings[userBookings.length - 1];
                currentTableNumber = latest.tableNumber;
                if (tableDisplay) tableDisplay.textContent = 'Table: ' + currentTableNumber;
            } else {
                if (tableDisplay) tableDisplay.textContent = 'Table: -';
            }
        })
        .catch(err => console.error("Could not fetch table info:", err));

    // Preload existing order
    try {
        const existing = _safeGet('currentOrder', null);
        if (existing && Array.isArray(existing.items)) {
            orderItems = existing.items.map(i => ({ 
                id: i.id, 
                name: i.name, 
                price: i.price, 
                quantity: i.qty || i.quantity, 
                image: i.image 
            }));
        }
    } catch (e) { }

    renderOrderItems();
    updateOrderSummary();
}

function renderMenu(data = menuData) {
    if (!data || data.length === 0) {
        menuGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#a4a4a4;">No items available</p>';
        return;
    }

    // if category filter dropdown exists, populate unique categories
    // (no longer applicable since dropdown is removed)

    menuGrid.innerHTML = data.map(item => {
        const avg = (typeof item.rating !== 'undefined') ? item.rating : (item.avg_rating || 0);
        const count = (typeof item.rating_count !== 'undefined') ? item.rating_count : (item.rating_count || 0);
        return `
        <div class="menu-card">
            <img src="${item.image_url || item.image || '../assets/default.jpg'}" alt="${item.name}" class="menu-card-image">
            <div class="menu-card-content">
                <div class="menu-card-header">
                    <h3 class="menu-card-title">${item.name}</h3>
                    <span class="menu-card-price">₹${Number(item.price || 0).toFixed(2)}</span>
                </div>
                <p class="menu-card-description">${item.description || ''}</p>
                <div class="menu-card-footer">
                    <div class="rating">
                        <svg viewBox="0 0 20 20"><path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/></svg>
                        ${avg || 0} <span style="font-weight:400;color:#999;margin-left:6px">(${count})</span>
                    </div>
                    <div>
                        <button class="add-product-btn" onclick="addToOrder('${item.id || item._id}')">+ Add Product</button>
                    </div>
                </div>
                <div style="margin-top:8px; display:flex; gap:6px; align-items:center;">
                    <span style="font-size:0.85rem;color:#666">Rate this:</span>
                    ${[1,2,3,4,5].map(n => `<span class="menu-star" onclick="submitRating('${item.id || item._id}', ${n})" data-value="${n}">★</span>`).join('')}
                </div>
            </div>
        </div>
    `}).join('');

    // Wire up star rating clicks to highlight stars
    const starElems = menuGrid.querySelectorAll('.menu-star');
    starElems.forEach(el => {
        el.addEventListener('click', () => {
            const val = parseInt(el.getAttribute('data-value'));
            const parent = el.parentElement;
            if (!parent) return;
            const siblings = parent.querySelectorAll('.menu-star');
            siblings.forEach(s => {
                const v = parseInt(s.getAttribute('data-value'));
                if (v <= val) s.classList.add('selected');
                else s.classList.remove('selected');
            });
        });
    });
}

// Submit a rating for a product
async function submitRating(productId, rating) {
    const user = _safeGet('loggedUser', {});
    const payload = { email: user.email || null, rating, comment: null };
    try {
        const res = await fetch(`/api/products/${productId}/rate`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (res.ok) {
            alert('Thanks for your rating!');
            // refresh products to show updated avg
            try {
                const pr = await fetch('/api/products');
                if (pr.ok) {
                    const serverProducts = await pr.json();
                    menuData = serverProducts;
                    renderMenu();
                }
            } catch (e) { console.warn('Could not refresh products after rating', e); }
        } else {
            alert('Failed to submit rating.');
        }
    } catch (err) {
        console.error('Rating failed', err);
        alert('Network error while submitting rating.');
    }
}

// --- Helper functions for search & orders ---
function handleSearch() {
    const q = (searchInput.value || '').toLowerCase().trim();
    let filtered = menuData || [];
    if (q) {
        filtered = filtered.filter(i => (i.name || '').toLowerCase().includes(q) || (i.description||'').toLowerCase().includes(q));
    }
    if (selectedCategory) {
        filtered = filtered.filter(i => (i.category || '') === selectedCategory);
    }
    renderMenu(filtered);
}

searchBtn?.addEventListener('click', handleSearch);
searchInput?.addEventListener('input', () => { if (!searchInput.value) renderMenu(); });

// Add click logic to category icons for filtering
document.querySelectorAll('.cat-icon').forEach(icon => {
    icon.addEventListener('click', () => {
        const category = icon.title; // Get category from title attribute
        selectedCategory = category === 'All' ? '' : category;
        handleSearch();
    });
});

function addToOrder(id) {
    const key = String(id);
    const item = (menuData || []).find(i => String(i.id) === key || String(i._id) === key);
    if (!item) return alert('Item not found');

    const existing = orderItems.find(o => String(o.id) === key);
    if (existing) existing.quantity += 1;
    else orderItems.push({ id: item.id || item._id, name: item.name, price: Number(item.price || 0), quantity: 1, image: item.image_url || item.image });

    renderOrderItems();
    updateOrderSummary();
}

function renderOrderItems() {
    if (!orderItems || orderItems.length === 0) {
        orderItemsContainer.innerHTML = '<div class="empty-order"><p>No items in order</p></div>';
        placeOrderBtn.disabled = true;
        return;
    }
    placeOrderBtn.disabled = false;
    orderItemsContainer.innerHTML = orderItems.map(it => `
        <div class="order-item">
            <img src="${it.image || '../assets/default.jpg'}" class="order-item-image">
            <div class="order-item-details">
                <div class="order-item-name">${it.name}</div>
                <div class="order-item-price">₹${Number(it.price).toFixed(2)}</div>
                <div class="order-item-controls">
                    <button class="quantity-btn" onclick="updateQuantity('${it.id}', -1)">-</button>
                    <div class="quantity-display">${it.quantity}</div>
                    <button class="quantity-btn" onclick="updateQuantity('${it.id}', 1)">+</button>
                </div>
            </div>
            <button class="remove-item-btn" onclick="removeItem('${it.id}')">×</button>
        </div>
    `).join('');
}

function updateQuantity(id, delta) {
    const it = orderItems.find(x => String(x.id) === String(id));
    if (!it) return;
    it.quantity = Math.max(0, (it.quantity || 0) + delta);
    if (it.quantity === 0) orderItems = orderItems.filter(x => String(x.id) !== String(id));
    renderOrderItems();
    updateOrderSummary();
}

function removeItem(id) {
    orderItems = orderItems.filter(x => String(x.id) !== String(id));
    renderOrderItems();
    updateOrderSummary();
}

function updateOrderSummary() {
    const subtotal = orderItems.reduce((sum, i) => sum + (i.price || 0) * (i.quantity || 0), 0);
    const tax = +(subtotal * 0.08).toFixed(2);
    const charges = 5.00;
    const total = +(subtotal + tax + charges).toFixed(2);
    document.getElementById('subtotal').textContent = '₹' + subtotal.toFixed(2);
    document.getElementById('tax').textContent = '₹' + tax.toFixed(2);
    document.getElementById('charges').textContent = '₹' + charges.toFixed(2);
    document.getElementById('total').textContent = '₹' + total.toFixed(2);
}

placeOrderBtn.addEventListener('click', () => {
    if (orderItems.length === 0) return alert('No items in order');

    const user = _safeGet('loggedUser', {});
    const subtotal = orderItems.reduce((sum, item) => sum + item.price * item.quantity, 0);
    const tax = +(subtotal * 0.08).toFixed(2);
    const charges = 5.00;
    const total = +(subtotal + tax + charges).toFixed(2);

    const existingOrder = _safeGet('currentOrder', null);
    let order = existingOrder;
    if (!order) {
        order = {
            id: 'ORD-' + Date.now(),
            user: user || null,
            tableNumber: currentTableNumber,
            items: [],
            subtotal, tax, charges, total,
            createdAt: new Date().toISOString(),
            status: 'pending'
        };
    }

    order.items = order.items || [];
    orderItems.forEach(i => {
        const existing = order.items.find(x => x.id === i.id);
        if (existing) { existing.qty = (existing.qty || 0) + i.quantity; } 
        else { order.items.push({ id: i.id, name: i.name, price: i.price, qty: i.quantity, image: i.image }); }
    });

    localStorage.setItem('currentOrder', JSON.stringify(order));
    orderItems = [];
    renderOrderItems();
    updateOrderSummary();
    setTimeout(() => { window.location.href = 'billing.html'; }, 300);
});

document.getElementById("logoutBtn")?.addEventListener("click", () => {
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("loggedUser");
    window.location.href = "login.html";
});

init();
</script>
