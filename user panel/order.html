<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Screen</title>
  <link rel="stylesheet" href="order.css">
</head>
<body>
  <div class="order" id="splashScreen">
    <div class="brand-corner">SeffronSky</div>
    <div class="overlay">
      <img src="assets/order.jpg" alt="Pointsell Logo" class="logo">
      <h1>You are successfully Place Your Order...</h1>
      <h3>Please wait 10-15 minutes...</h3>
      </div>
    </div>
  </div>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Brush Script MT", "Lucida Handwriting", "Apple Chancery", "Comic Sans MS", cursive;
}

body, html {
  height: 100%;
  width: 100%;

}

.order {
  background: url("assets/food background.jpg") no-repeat center center/cover;
  height: 100vh;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  position: relative;
}
/* brand corner */
.brand-corner{
  position: absolute;
  left: 16px;
  top: 16px;
  background: rgba(255,255,255,0.9);
  color: #ff6600;
  padding: 6px 10px;
  border-radius: 6px;
  font-weight:700;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  z-index: 50;
  font-size:0.95rem;
}
/* responsive tweaks for brand label (order anchored left) */
@media (max-width:900px) {
  .brand-corner{ left: 14px; top: 12px; font-size:0.9rem; padding:5px 8px; }
}
@media (max-width:480px) {
  .brand-corner{ left: 10px; top: 8px; font-size:0.85rem; padding:4px 7px; }
}

.splash-content {
  text-align: center;
  background: rgba(255, 167, 108, 0.5);
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0px 4px 20px rgba(0,0,0,0.5);
}

.logo {
  width: 650px;
  margin-bottom: 30px;
}

h1 {
  color: #f88f49d8;
  font-size: 50
  0px;
   display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  position: relative;
  
}
h3 {
  color: #f88f49d8;
  font-size: 15px;
   display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  position: relative;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}
  </style>

  <script>// When user clicks anywhere on the splash screen, go to login.html
document.getElementById("splashScreen").addEventListener("click", function() {
 
    window.location.href = "feedback.html";
});
</script>
</body>
</html>
