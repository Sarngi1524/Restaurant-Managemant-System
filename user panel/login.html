<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth System | Login, Register, Forgot & Reset Password</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background:url('assets/food background.jpg') no-repeat center center/cover; 
    }

    .container {
      display: flex;
      width: 900px;
      max-width: 95%;
      box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
      border-radius: 15px;
      overflow: hidden;
    }
    /* brand corner */
    .container { position: relative; }
    .brand-corner{
      position: absolute;
      left: 12px;
      top: 12px;
      color: #ff6600;
      padding: 6px 10px;
      border-radius: 6px;
      font:weight 10px;
      z-index: 50;
      font-family: "Brush Script MT", "Lucida Handwriting", "Apple Chancery", "Comic Sans MS", cursive;
      font-size:0.9rem;
    }
    /* responsive tweaks for brand label (login anchored left) */
    @media (max-width:900px) {
      .brand-corner{ left: 16px; top: 14px; font-size:0.85rem; padding:5px 8px; }
    }
    @media (max-width:480px) {
      .brand-corner{ left: 12px; top: 10px; font-size:0.8rem; padding:4px 7px; }
    }

    .illustration {
      flex: 1;
      background: #ffa76c7c;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .illustration img {
      width: 100%;
      max-width: 400px;
    }

    .form-box {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
       background: #ffa76c7c;
    }

    h2 {
      font-size: 26px;
      margin-bottom: 15px;
      font-weight: 700;
      text-align: center;
    }

    p {
      font-size: 14px;
      color: #333;
      text-align: center;
      margin-bottom: 15px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 15px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #ff6600;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 15px;
    }
    .btn:hover {
      background: #e65c00;
    }

    .toggle {
      text-align: center;
      font-size: 14px;
    }

    .toggle a {
      color: #ff6600;
      text-decoration: none;
      cursor: pointer;
    }

    .message {
      text-align: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .error {
      color: red;
    }

    .success {
      color: green;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand-corner">SeffronSky</div>
    <!-- Illustration -->
    <div class="illustration">
      <img
        src="assets/login page.png"
        alt="illustration"
      />
    </div>

    <!-- Forms -->
    <div class="form-box">
      <!-- Login Form -->
      <form id="loginForm">
        <h2>Welcome Back!</h2>
        <div id="loginMsg" class="message"></div>
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="Email Address" required />
        </div>
        <div class="input-group">
          <input type="password" id="loginPassword" placeholder="Password" required />
        </div>
        <button type="submit" class="btn">Login</button>
        <p class="toggle"><a id="showForgot">Forgot Password?</a></p>
        <p class="toggle">Don't have an account? <a id="showRegister">Sign Up</a></p>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="hidden">
        <h2>Registration</h2>
        <div id="registerMsg" class="message"></div>
        <div class="input-group">
          <input type="text" id="regName" placeholder="Full Name" required />
        </div>
        <div class="input-group">
          <input type="email" id="regEmail" placeholder="Email Address" required />
        </div>
        <div class="input-group">
          <input type="password" id="regPassword" placeholder="Password" required />
        </div>
        <div class="input-group">
          <input type="password" id="regConfirm" placeholder="Confirm Password" required />
        </div>
        <button type="submit" class="btn">Sign Up</button>
        <p class="toggle">Already have an account? <a id="showLoginFromRegister">Login</a></p>
      </form>

      <!-- Forgot Password -->
      <form id="forgotForm" class="hidden">
        <h2>Forgot Password</h2>
        <p>Please enter your email to receive a reset link.</p>
        <div id="forgotMsg" class="message"></div>
        <div class="input-group">
          <input type="email" id="forgotEmail" placeholder="Email Address" required />
        </div>
        <button type="submit" class="btn">Send Reset Link</button>
        <p class="toggle">Remembered? <a id="showLoginFromForgot">Login</a></p>
      </form>

      <!-- Reset Password -->
      <form id="resetForm" class="hidden">
        <h2>Reset Password</h2>
        <p>Enter your new password below.</p>
        <div id="resetMsg" class="message"></div>
        <div class="input-group">
          <input type="password" id="newPass" placeholder="New Password" required />
        </div>
        <div class="input-group">
          <input type="password" id="confirmNewPass" placeholder="Confirm New Password" required />
        </div>
        <button type="submit" class="btn">Reset Password</button>
        <p class="toggle"><a id="backToLogin">Back to Login</a></p>
      </form>
    </div>
  </div>

  <script src="user.js"></script>
</body>
</html>
