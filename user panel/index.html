<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splash Screen</title>
  <link rel="stylesheet" href="splash.css">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b6b">
</head>
<body>
  <div class="splash" id="splashScreen">
    <div class="overlay">
      <img src="assets/food.png" alt="Pointsell Logo" class="logo">
      <h1>Saffron Sky</h1>
    </div>
  </div>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Brush Script MT", "Lucida Handwriting", "Apple Chancery", "Comic Sans MS", cursive;
}

html, body {
  height: 100%;
  width: 100%;
}

.splash {
  background: url("assets/food background.jpg") no-repeat center center/cover;
  min-height: 100vh;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  position: relative;
  padding: 20px;
}

.overlay {
  width: min(92vw, 780px);
  text-align: center;
  background: transparent;
  backdrop-filter: none;
  border-radius: 16px;
  box-shadow: none;
  padding: 28px 20px;
}

.logo {
  width: clamp(180px, 55vw, 400px);
  margin: 0 auto 14px;
  display: block;
}

h1 {
  color: #f88f49d8;
  font-size: clamp(2rem, 7vw, 4.4rem);
  line-height: 1.05;
  text-align: center;
  letter-spacing: 0.02em;
}

@media (max-width: 768px) {
  .splash {
    padding: 14px;
  }

  .overlay {
    width: min(95vw, 560px);
    padding: 22px 14px;
    border-radius: 14px;
  }

  .logo {
    width: clamp(150px, 58vw, 300px);
    margin-bottom: 10px;
  }
}

@media (max-width: 480px) {
  .splash {
    padding: 10px;
  }

  .overlay {
    width: 100%;
    padding: 18px 12px;
    border-radius: 12px;
  }

  .logo {
    width: clamp(130px, 62vw, 220px);
  }

  h1 {
    font-size: clamp(1.7rem, 9vw, 2.6rem);
  }
}
  </style>

  <script>// When user clicks anywhere on the splash screen, go to login.html
document.getElementById("splashScreen").addEventListener("click", function() {
  window.location.href = "login.html";
});
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker Registered"));
}
</script>
</body>
</html>
